<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#f5f5f6" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#161613" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="QED2" />
    <title>QED2 · Matura Mathematik</title>
  </head>
  <body>
    <div id="app">
      <style>
        .initial-loading {
          display: flex;
          align-items: center;
          justify-content: center;
          height: 100vh;
          height: 100dvh; /* iOS: exclude the dynamic toolbar */
          width: 100vw;
          background: #f5f5f6; /* var(--q-page) fallback */
          font-family: 'Public Sans', system-ui, sans-serif;
        }
        @media (prefers-color-scheme: dark) {
          .initial-loading { background: #161613; }
        }
        .boot {
          display: flex;
          flex-direction: column;
          align-items: center;
          gap: 18px;
          width: min(240px, 70vw);
        }
        .boot__logo {
          font-weight: 800;
          font-size: 26px;
          letter-spacing: -0.02em;
          color: #1a1a1a;
        }
        .boot__logo span { color: #8e9c49; }
        @media (prefers-color-scheme: dark) {
          .boot__logo { color: #ecebe6; }
        }
        .boot__track {
          width: 100%;
          height: 4px;
          border-radius: 2px;
          background: rgba(142, 156, 73, 0.18);
          overflow: hidden;
        }
        .boot__bar {
          height: 100%;
          width: 6%;
          border-radius: 2px;
          background: #8e9c49;
          transition: width 0.3s ease;
        }
        .boot__label {
          font-size: 12px;
          color: #6b6d63;
          min-height: 1.2em;
        }
        @media (prefers-color-scheme: dark) {
          .boot__label { color: #9d9f92; }
        }
        @media (prefers-reduced-motion: reduce) {
          .boot__bar { transition: none; }
        }
      </style>
      <div class="initial-loading" role="status" aria-label="QED2 wird geladen">
        <div class="boot">
          <div class="boot__logo">QED<span>2</span></div>
          <div class="boot__track"><div class="boot__bar" id="boot-bar"></div></div>
          <div class="boot__label" id="boot-label">Starte …</div>
        </div>
      </div>
      <noscript>
        <p style="font-family: system-ui, sans-serif; padding: 2rem; text-align: center">
          QED2 benötigt JavaScript. / QED2 requires JavaScript.
        </p>
      </noscript>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
