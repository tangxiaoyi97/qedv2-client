<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="color-scheme" content="light dark" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="QED2" />
    <title>QED2 · Matura Mathematik</title>
    <link rel="stylesheet" href="/src/styles/theme-extensions.css" />
    <script id="theme-bootstrap">
      (() => {
        const root = document.documentElement;
        try {
          root.dataset.theme = window.matchMedia('(prefers-color-scheme: dark)').matches
            ? 'dark'
            : 'light';
        } catch {
          root.dataset.theme = 'light';
        }
        try {
          const storage = window.localStorage;
          const cachedCss = storage.getItem('qed2.themeCss');
          if (cachedCss) {
            const style = document.createElement('style');
            style.id = 'qed2-external-theme';
            style.textContent = cachedCss;
            document.head.appendChild(style);
            root.removeAttribute('data-accent');
          } else {
            const saved = storage.getItem('qed2.accent');
            if (saved) root.dataset.accent = saved;
            else root.removeAttribute('data-accent');
          }
        } catch {
          // Storage can be absent or blocked; the default :root extension wins.
          root.removeAttribute('data-accent');
        }
      })();
    </script>
  </head>
  <body>
    <div id="app">
      <style id="boot-styles">
        .initial-loading {
          display: flex;
          align-items: center;
          justify-content: center;
          height: 100vh;
          height: 100dvh; /* iOS: exclude the dynamic toolbar */
          width: 100vw;
          background: var(--q-page);
          font-family: 'Public Sans', system-ui, sans-serif;
        }
        .boot {
          display: flex;
          flex-direction: column;
          align-items: center;
          gap: 18px;
          width: min(240px, 70vw);
        }
        .boot__logo {
          font-weight: 800;
          font-size: 26px;
          letter-spacing: -0.02em;
          color: var(--q-ink);
        }
        .boot__logo span { color: var(--q-accent); }
        .boot__track {
          width: 100%;
          height: 4px;
          border-radius: 2px;
          background: var(--q-track);
          overflow: hidden;
        }
        .boot__bar {
          height: 100%;
          width: 6%;
          border-radius: 2px;
          background: var(--q-accent);
          transition: width 0.3s ease;
        }
        .boot__label {
          font-size: 12px;
          color: var(--q-mut-2);
          min-height: 1.2em;
        }
        @media (prefers-reduced-motion: reduce) {
          .boot__bar { transition: none; }
        }
      </style>
      <div class="initial-loading" role="status" aria-label="QED2 wird geladen">
        <div class="boot">
          <div class="boot__logo">QED<span>2</span></div>
          <div class="boot__track"><div class="boot__bar" id="boot-bar"></div></div>
          <div class="boot__label" id="boot-label">Starte …</div>
        </div>
      </div>
      <noscript>
        <p style="font-family: system-ui, sans-serif; padding: 2rem; text-align: center">
          QED2 benötigt JavaScript. / QED2 requires JavaScript.
        </p>
      </noscript>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
